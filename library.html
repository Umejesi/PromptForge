<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Library — PromptForge</title>
<meta name="description" content="Browse professionally categorized, rated prompts for every use case — verified, staff-picked, and community submitted.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.lib-controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.lib-search{flex:1;min-width:200px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:11px 14px;font-size:14px;color:var(--txt)}
.lib-search::placeholder{color:var(--txt3)}
.lib-sort{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:11px 14px;font-size:13px;color:var(--txt);cursor:pointer}

.cat-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:22px}
.cat-pill{padding:6px 14px;border-radius:99px;font-size:12px;font-weight:600;background:var(--surface);border:1px solid var(--border);color:var(--txt2);cursor:pointer;transition:all 0.15s}
.cat-pill:hover{border-color:var(--border2);color:var(--txt)}
.cat-pill.on{background:var(--indigo-g);border-color:rgba(108,99,255,0.35);color:var(--indigo2)}

.lib-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px}
.lib-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;display:flex;flex-direction:column;gap:10px;cursor:pointer;transition:all 0.2s}
.lib-card:hover{border-color:rgba(108,99,255,0.25);transform:translateY(-2px)}
.lib-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.lib-cat-tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;padding:3px 10px;border-radius:99px;background:var(--indigo-g);color:var(--indigo2)}
.lib-badges{display:flex;gap:5px;flex-shrink:0}
.badge-verified,.badge-staffpick{font-size:10px;padding:2px 8px;border-radius:99px;font-weight:700;white-space:nowrap}
.badge-verified{background:var(--mint-g);color:var(--mint)}
.badge-staffpick{background:var(--amber-g);color:var(--amber)}
.lib-title{font-family:var(--display);font-size:15px;font-weight:700;line-height:1.3}
.lib-desc{font-size:12.5px;color:var(--txt2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.lib-ai-tags{display:flex;gap:5px;flex-wrap:wrap}
.lib-ai-tag{font-size:10px;padding:2px 8px;border-radius:99px;background:var(--surface2);border:1px solid var(--border);color:var(--txt3)}
.lib-card-foot{display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid var(--border);font-size:12px;color:var(--txt3)}
.lib-diff{font-size:10px;padding:2px 9px;border-radius:99px;background:var(--surface2);color:var(--txt2)}
.lib-creator-row{display:flex;align-items:center;gap:7px;margin:2px 0 4px}
.lib-creator-av{width:20px;height:20px;border-radius:50%;background:var(--indigo-g);display:flex;align-items:center;justify-content:center;font-size:8.5px;font-weight:700;color:var(--indigo2)}
.lib-creator-name{font-size:11.5px;color:var(--txt3)}
.lib-bookmark{font-size:16px;color:var(--txt3);cursor:pointer;transition:color 0.15s;background:none;border:none}
.lib-bookmark:hover{color:var(--amber)}
.lib-bookmark.saved{color:var(--amber)}

.lib-empty{text-align:center;padding:50px 20px;color:var(--txt3);font-size:13px}

.lib-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:500;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto;backdrop-filter:blur(4px)}
.lib-modal-overlay.open{display:flex}
.lib-modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-xl);max-width:620px;width:100%}
.lib-modal-head{padding:24px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:14px}
.lib-modal-close{width:30px;height:30px;border-radius:var(--r-sm);background:var(--surface2);color:var(--txt2);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.lib-modal-body{padding:20px 24px 24px}
.lib-modal-prompt{font-family:var(--mono);font-size:12.5px;line-height:1.7;color:var(--txt2);background:var(--deep);border-radius:var(--r);padding:16px 18px;white-space:pre-wrap;margin-bottom:16px}
.rate-row{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.rate-star{font-size:20px;cursor:pointer;color:var(--txt3);transition:color 0.1s}
.rate-star.filled{color:var(--amber)}
.like-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:99px;background:var(--surface2);border:1px solid var(--border);color:var(--txt2);font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s}
.like-btn.liked{background:rgba(255,107,138,0.1);border-color:rgba(255,107,138,0.3);color:var(--rose)}

.submit-field{margin-bottom:14px}
.submit-field label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--txt3);margin-bottom:6px}

@media(max-width:640px){
  .lib-grid{grid-template-columns:1fr}
  .lib-modal-overlay{padding:0}
  .lib-modal{border-radius:0;min-height:100vh}
}
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="shared.js"></script>
<script>
let allPrompts = [];
let activePrompt = null;
let myRatings = {};
let myLikes = new Set();
let myBookmarks = new Set();
let activeCat = 'all';

// Matches the real `categories` table exactly (id/icon/label), so
// pills look identical to Prompt Studio's category filters.
const CATEGORY_ICONS = {
  'Business':'💼','Content Creation':'🎬','Customer Support':'🎧','Cybersecurity':'🛡',
  'Design':'🎨','Education':'🎓','Finance':'💰','Human Resources':'🧑\u200d💼',
  'Legal':'⚖️','Marketing':'📣','Sales':'📈','Software Development':'💻','Writing':'✍️'
};
function catIcon(name){ return CATEGORY_ICONS[name] ? CATEGORY_ICONS[name]+' ' : ''; }

async function loadLibrary(){
  const grid = document.getElementById('libGrid');
  try{
    const { data: prompts, error } = await sb
      .from('library_prompts')
      .select('*')
      .order('created_at', { ascending: false });

    if(error) throw error;
    allPrompts = prompts || [];

    // Fetch creator profiles as a separate query instead of an
    // embedded join — library_prompts has more than one foreign key
    // path to profiles, which makes PostgREST's automatic embed
    // ambiguous ("more than one relationship was found"). A manual
    // second query sidesteps that entirely.
    const userIds = [...new Set(allPrompts.map(p => p.user_id).filter(Boolean))];
    if(userIds.length){
      const { data: creators } = await sb.from('profiles').select('id, display_name, username').in('id', userIds);
      const creatorMap = {};
      (creators||[]).forEach(c => { creatorMap[c.id] = c; });
      allPrompts.forEach(p => { p.profiles = p.user_id ? (creatorMap[p.user_id] || null) : null; });
    }

    const cats = [...new Set(allPrompts.map(p => p.category).filter(Boolean))];
    const filterRow = document.getElementById('libFilters');
    cats.forEach(name=>{
      const pill = document.createElement('div');
      pill.className = 'cat-pill';
      pill.dataset.cat = name;
      pill.textContent = catIcon(name) + name;
      pill.onclick = () => filterCat(name, pill);
      filterRow.appendChild(pill);
    });

    const {user} = await loadCurrentUser();
    if(user){
      const { data: ratings } = await sb.from('prompt_ratings').select('prompt_id,rating').eq('user_id', user.id);
      (ratings||[]).forEach(r => myRatings[r.prompt_id] = r.rating);
      const { data: likes } = await sb.from('prompt_likes').select('prompt_id').eq('user_id', user.id);
      (likes||[]).forEach(l => myLikes.add(l.prompt_id));
      const { data: bookmarks } = await sb.from('saved_prompts').select('source_prompt_id').eq('user_id', user.id).not('source_prompt_id', 'is', null);
      (bookmarks||[]).forEach(b => myBookmarks.add(b.source_prompt_id));
    }

    applyFilters();
  }catch(err){
    console.error('Library load error:', err);
    grid.innerHTML = '<div class="lib-empty">Couldn\'t load the library right now — ' + escapeHtml(err.message||'try refreshing') + '</div>';
  }
}

function filterCat(cat, el){
  activeCat = cat;
  document.querySelectorAll('.cat-pill').forEach(p=>p.classList.remove('on'));
  el.classList.add('on');
  applyFilters();
}

function applyFilters(){
  const q = document.getElementById('libSearch').value.trim().toLowerCase();
  const sort = document.getElementById('libSort').value;

  let list = allPrompts.filter(p => activeCat === 'all' || p.category === activeCat);
  if(q){
    list = list.filter(p =>
      (p.title||'').toLowerCase().includes(q) ||
      (p.description||'').toLowerCase().includes(q) ||
      (p.category||'').toLowerCase().includes(q)
    );
  }

  if(sort === 'popular') list = [...list].sort((a,b) => (b.likes||0) - (a.likes||0));
  else if(sort === 'rated') list = [...list].sort((a,b) => (b.avg_rating||0) - (a.avg_rating||0));
  else list = [...list].sort((a,b) => new Date(b.created_at||0) - new Date(a.created_at||0));

  renderGrid(list);
}

function renderGrid(list){
  const grid = document.getElementById('libGrid');
  if(!list.length){
    grid.innerHTML = '<div class="lib-empty">No prompts match — try a different search or category.</div>';
    return;
  }
  grid.innerHTML = list.map(p => {
    const creatorName = p.profiles?.display_name || (p.is_official ? 'PromptForge' : 'Anonymous');
    const isBookmarked = myBookmarks.has(p.id);
    return `
    <div class="lib-card" onclick="openPrompt('${p.id}')">
      <div class="lib-card-top">
        <span class="lib-cat-tag">${catIcon(p.category)}${escapeHtml(p.category||'General')}</span>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="lib-badges">
            ${p.is_verified ? '<span class="badge-verified">✓ Verified</span>' : ''}
            ${p.is_staff_pick ? '<span class="badge-staffpick">★ Staff Pick</span>' : ''}
          </div>
          <button class="lib-bookmark${isBookmarked?' saved':''}" onclick="toggleBookmark('${p.id}', event)" title="Save for later">${isBookmarked?'★':'☆'}</button>
        </div>
      </div>
      <div class="lib-title">${escapeHtml(p.title)}</div>
      <div class="lib-desc">${escapeHtml(p.description||'')}</div>
      <div class="lib-creator-row">
        <div class="lib-creator-av">${escapeHtml(creatorName).slice(0,2).toUpperCase()}</div>
        <span class="lib-creator-name">${escapeHtml(creatorName)}</span>
      </div>
      <div class="lib-ai-tags">${(p.ai_models||[]).slice(0,3).map(m=>`<span class="lib-ai-tag">✓ ${escapeHtml(m)}</span>`).join('')}</div>
      <div class="lib-card-foot">
        <span class="lib-diff">${escapeHtml(p.difficulty||'Beginner')}</span>
        <span>⭐ ${(p.avg_rating||0).toFixed(1)}</span>
        <span>❤️ ${p.likes||0}</span>
      </div>
    </div>`;
  }).join('');
}

async function toggleBookmark(promptId, event){
  event.stopPropagation();
  if(!currentUser){ openLogin(); return; }

  const prompt = allPrompts.find(p => p.id === promptId);
  if(!prompt) return;

  try{
    if(myBookmarks.has(promptId)){
      const { error } = await sb.from('saved_prompts').delete().eq('user_id', currentUser.id).eq('source_prompt_id', promptId);
      if(error) throw error;
      myBookmarks.delete(promptId);
      toast('Removed from saved');
    } else {
      const { error } = await sb.from('saved_prompts').insert({
        user_id: currentUser.id,
        content: prompt.prompt_text,
        category: prompt.category,
        source: 'library',
        source_prompt_id: promptId
      });
      if(error) throw error;
      myBookmarks.add(promptId);
      toast('★ Saved — find it on your Dashboard');
    }
    applyFilters();
  }catch(err){
    console.error(err);
    toast('❌ ' + (err.message || 'Could not update bookmark'));
  }
}

function openPrompt(id){
  const p = allPrompts.find(x => x.id === id);
  if(!p) return;
  activePrompt = p;

  document.getElementById('modalBadges').innerHTML = `
    <span class="lib-cat-tag">${catIcon(p.category)}${escapeHtml(p.category||'General')}</span>
    ${p.is_verified ? '<span class="badge-verified">✓ Verified</span>' : ''}
    ${p.is_staff_pick ? '<span class="badge-staffpick">★ Staff Pick</span>' : ''}
  `;
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalDesc').textContent = (p.profiles?.display_name ? 'by ' + p.profiles.display_name + ' — ' : '') + (p.description || '');
  document.getElementById('modalPromptText').textContent = p.prompt_text || '(no prompt text yet)';
  document.getElementById('modalAiTags').innerHTML = (p.ai_models||[]).map(m=>`<span class="lib-ai-tag">✓ ${escapeHtml(m)}</span>`).join('');

  renderStars(myRatings[p.id] || 0);

  const liked = myLikes.has(p.id);
  document.getElementById('likeBtn').classList.toggle('liked', liked);
  document.getElementById('likeBtn').innerHTML = (liked?'❤️ ':'🤍 ') + '<span id="likeCount">'+(p.likes||0)+'</span>';

  document.getElementById('libModal').classList.add('open');
}

function renderStars(current){
  const row = document.getElementById('starRow');
  row.innerHTML = '';
  for(let i=1;i<=5;i++){
    const span = document.createElement('span');
    span.className = 'rate-star' + (i <= current ? ' filled' : '');
    span.textContent = '★';
    span.onclick = () => submitRating(i);
    row.appendChild(span);
  }
}

async function submitRating(stars){
  if(!activePrompt) return;
  if(!currentUser){ openLogin(); return; }
  try{
    const { error } = await sb.rpc('rate_prompt', { p_prompt_id: activePrompt.id, p_rating: stars });
    if(error) throw error;
    myRatings[activePrompt.id] = stars;
    renderStars(stars);
    toast('⭐ Rating saved');

    const { data: refreshed } = await sb.from('library_prompts').select('avg_rating,rating_count').eq('id', activePrompt.id).single();
    if(refreshed){
      Object.assign(activePrompt, refreshed);
      const idx = allPrompts.findIndex(p=>p.id===activePrompt.id);
      if(idx>-1) Object.assign(allPrompts[idx], refreshed);
      applyFilters();
    }
  }catch(err){
    console.error(err);
    toast('❌ Could not save rating');
  }
}

async function toggleLike(){
  if(!activePrompt) return;
  if(!currentUser){ openLogin(); return; }
  try{
    const { data: nowLiked, error } = await sb.rpc('toggle_prompt_like', { p_prompt_id: activePrompt.id });
    if(error) throw error;
    if(nowLiked) myLikes.add(activePrompt.id); else myLikes.delete(activePrompt.id);
    activePrompt.likes = (activePrompt.likes||0) + (nowLiked ? 1 : -1);
    const idx = allPrompts.findIndex(p=>p.id===activePrompt.id);
    if(idx>-1) allPrompts[idx].likes = activePrompt.likes;
    document.getElementById('likeBtn').classList.toggle('liked', nowLiked);
    document.getElementById('likeBtn').innerHTML = (nowLiked?'❤️ ':'🤍 ') + '<span>'+(activePrompt.likes||0)+'</span>';
    applyFilters();
  }catch(err){
    console.error(err);
    toast('❌ Could not update like');
  }
}

function closeLibModal(){ document.getElementById('libModal').classList.remove('open'); }

async function copyActivePrompt(){
  if(!activePrompt) return;
  navigator.clipboard.writeText(activePrompt.prompt_text || '').then(()=>{
    toast('📋 Copied to clipboard');
  });
}

function openSubmitModal(){
  if(!currentUser){ openLogin(); return; }
  document.getElementById('submitModal').classList.add('open');
}
function closeSubmitModal(){ document.getElementById('submitModal').classList.remove('open'); }

async function submitPrompt(){
  const title = document.getElementById('subTitle').value.trim();
  const category = document.getElementById('subCategory').value;
  const description = document.getElementById('subDesc').value.trim();
  const prompt_text = document.getElementById('subPromptText').value.trim();

  if(!title || !prompt_text){ toast('⚠️ Title and prompt text are required'); return; }
  if(!currentUser){ openLogin(); return; }

  try{
    const { error } = await sb.from('library_prompts').insert({
      user_id: currentUser.id,
      title, category, description, prompt_text, content: prompt_text,
      ai_models: ['ChatGPT','Claude']
    });
    if(error) throw error;

    toast('✅ Submitted! Thanks for contributing.');
    closeSubmitModal();
    document.getElementById('subTitle').value = '';
    document.getElementById('subDesc').value = '';
    document.getElementById('subPromptText').value = '';
    loadLibrary();
  }catch(err){
    console.error(err);
    toast('❌ ' + (err.message || 'Something went wrong'));
  }
}

function escapeHtml(str){
  if(!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

loadLibrary();
</script>
</body>
</html>
