<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Library — PromptForge</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.lib-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.f-pill{padding:7px 16px;border-radius:99px;font-size:12.5px;font-weight:600;background:var(--surface);border:1px solid var(--border);color:var(--txt2);cursor:pointer;transition:all 0.15s}
.f-pill.on{background:var(--indigo-g);border-color:rgba(108,99,255,0.35);color:var(--indigo2)}
.prompt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.p-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;display:flex;flex-direction:column;gap:12px;cursor:pointer;transition:all 0.2s}
.p-card:hover{border-color:rgba(108,99,255,0.25);transform:translateY(-2px)}
.p-cat{font-size:10px;font-weight:700;text-transform:uppercase;padding:3px 9px;border-radius:99px;background:var(--indigo-g);color:var(--indigo2)}
.p-title{font-family:var(--display);font-size:14.5px;font-weight:700}
.p-preview{font-size:12px;color:var(--txt2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.p-foot{display:flex;justify-content:space-between;font-size:11.5px;color:var(--txt3);padding-top:10px;border-top:1px solid var(--border)}
</style>
</head>
<body data-requires-auth="false">
<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><div style="width:30px;height:30px;background:linear-gradient(135deg,#6C63FF,#FFB830);border-radius:8px"></div><div class="sidebar-logo-text">PromptForge</div></div>
    <nav class="sidebar-nav">
      <div class="nav-section"><div class="nav-label">Create</div>
        <div class="nav-item" onclick="location.href='home.html'"><span class="nav-icon">🏠</span> Home</div>
        <div class="nav-item" onclick="location.href='text-generator.html'"><span class="nav-icon">⚡</span> Text Generator</div>
        <div class="nav-item active"><span class="nav-icon">📚</span> Library</div>
      </div>
      <div class="nav-section"><div class="nav-label">Community</div>
        <div class="nav-item" onclick="location.href='challenge.html'"><span class="nav-icon">🔥</span> Daily Challenge</div>
        <div class="nav-item" onclick="location.href='leaderboard.html'"><span class="nav-icon">🏆</span> Leaderboard</div>
      </div>
      <div class="nav-section"><div class="nav-label">Account</div>
        <div class="nav-item" onclick="location.href='dashboard.html'"><span class="nav-icon">📊</span> Dashboard</div>
      </div>
    </nav>
  </aside>
  <main class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px"><button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <div><div class="page-title">Prompt Library</div><div class="page-breadcrumb">847 community-tested prompts</div></div>
      </div>
      <div class="topbar-right"><div class="user-avatar" data-user-initials>?</div></div>
    </div>
    <div class="content">
      <div class="lib-filters">
        <div class="f-pill on" onclick="filt('all',this)">✦ All</div>
        <div class="f-pill" onclick="filt('mj',this)">🎨 Midjourney</div>
        <div class="f-pill" onclick="filt('gpt',this)">🤖 ChatGPT</div>
        <div class="f-pill" onclick="filt('yt',this)">🎬 YouTube</div>
        <div class="f-pill" onclick="filt('em',this)">✉️ Email</div>
        <div class="f-pill" onclick="filt('rs',this)">📄 Resume</div>
      </div>
      <div class="prompt-grid" id="grid"></div>
    </div>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="shared.js"></script>
<script>
let allPrompts = [];
let currentFilter = 'all';

async function loadLibrary(){
  const {data, error} = await sb
    .from('library_prompts')
    .select('id, title, category, content, preview, likes, profiles(display_name)')
    .order('likes', {ascending:false})
    .limit(60);

  if(error){
    document.getElementById('grid').innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--txt3)">Couldn't load the library right now.</div>`;
    return;
  }
  allPrompts = data || [];
  render(currentFilter==='all' ? allPrompts : allPrompts.filter(p=>p.category===currentFilter));
}

function render(items){
  if(!items.length){
    document.getElementById('grid').innerHTML = `
      <div style="grid-column:1/-1;text-align:center;padding:50px 20px">
        <div style="font-size:36px;opacity:0.3;margin-bottom:14px">📚</div>
        <div style="font-size:14px;color:var(--txt2);margin-bottom:18px">No prompts here yet — be the first to submit one!</div>
        <button class="btn-primary" onclick="window.location.href='text-generator.html'">Create a Prompt</button>
      </div>`;
    return;
  }
  document.getElementById('grid').innerHTML = items.map(p=>`
    <div class="p-card" onclick="usePrompt('${p.id}')">
      <div style="display:flex;justify-content:space-between">
        <span class="p-cat">${p.category}</span>
        <span style="font-size:11px;color:var(--txt2)">❤️ ${p.likes||0}</span>
      </div>
      <div class="p-title">${escapeHtml(p.title)}</div>
      <div class="p-preview">${escapeHtml(p.preview)}</div>
      <div class="p-foot"><span>${p.profiles?.display_name || 'Anonymous'}</span><span>Use →</span></div>
    </div>`).join('');
}

function escapeHtml(s){
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

function usePrompt(id){
  const p = allPrompts.find(x=>x.id===id);
  if(!p) return;
  sessionStorage.setItem('pf_loaded_prompt', p.content);
  window.location.href = 'text-generator.html';
}

function filt(cat,el){
  document.querySelectorAll('.f-pill').forEach(p=>p.classList.remove('on'));
  el.classList.add('on');
  currentFilter = cat;
  render(cat==='all' ? allPrompts : allPrompts.filter(p=>p.category===cat));
}

document.addEventListener('DOMContentLoaded', loadLibrary);
</script>
</body>
</html>
