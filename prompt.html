<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">Prompt — PromptForge</title>
<meta name="description" id="pageDesc" content="A rated, verified prompt from the PromptForge community.">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.pd-wrap{max-width:820px;margin:0 auto;padding:32px 24px 60px}
.pd-back{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--txt3);margin-bottom:18px}
.pd-back:hover{color:var(--txt2)}
.pd-top{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:16px;flex-wrap:wrap}
.pd-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.pd-title{font-family:var(--display);font-size:clamp(22px,3.5vw,30px);font-weight:800;letter-spacing:-0.5px;margin-bottom:14px}
.pd-desc{font-size:14.5px;color:var(--txt2);line-height:1.7;margin-bottom:20px}

.pd-creator-row{display:flex;align-items:center;gap:10px;margin-bottom:24px;cursor:pointer}
.pd-creator-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--indigo),var(--amber));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff}
.pd-creator-name{font-size:13.5px;font-weight:600}
.pd-creator-meta{font-size:11.5px;color:var(--txt3)}

.pd-prompt-box{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-xl);padding:24px;margin-bottom:20px}
.pd-prompt-label{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--mint);margin-bottom:14px;display:flex;align-items:center;gap:6px}
.pd-pulse{width:6px;height:6px;border-radius:50%;background:var(--mint)}
.pd-prompt-text{font-family:var(--mono);font-size:13.5px;line-height:1.8;color:var(--txt);white-space:pre-wrap;word-break:break-word;margin-bottom:18px}
.pd-actions{display:flex;gap:8px;flex-wrap:wrap;padding-top:16px;border-top:1px solid var(--border)}
.pd-btn{display:flex;align-items:center;gap:6px;padding:9px 16px;border-radius:var(--r-sm);font-size:13px;font-weight:600;background:var(--surface2);border:1px solid var(--border);color:var(--txt2);cursor:pointer;transition:all 0.15s}
.pd-btn:hover{color:var(--txt);border-color:var(--border2)}
.pd-btn.copy{background:linear-gradient(135deg,var(--indigo),#8B5CF6);color:#fff;border:none}
.pd-btn.liked{color:var(--rose);border-color:rgba(255,107,138,.3)}
.pd-btn.saved{color:var(--amber);border-color:rgba(255,184,48,.3)}

.pd-meta-row{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:24px;font-size:13px;color:var(--txt2)}
.pd-meta-row strong{color:var(--txt)}
.pd-stars{display:flex;gap:2px}
.pd-star{font-size:18px;cursor:pointer;color:var(--txt3)}
.pd-star.filled{color:var(--amber)}

.pd-related-title{font-family:var(--display);font-size:15px;font-weight:700;margin-bottom:12px}
.pd-related-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pd-related-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 16px;cursor:pointer;transition:all 0.15s}
.pd-related-card:hover{border-color:rgba(108,99,255,0.3)}
.pd-related-title2{font-size:13px;font-weight:600;margin-bottom:4px}
.pd-related-meta{font-size:11px;color:var(--txt3)}

.pd-empty{text-align:center;padding:60px 20px;color:var(--txt3)}

@media(max-width:600px){
  .pd-related-grid{grid-template-columns:1fr}
  .pd-actions{flex-direction:column}
  .pd-btn{justify-content:center}
}
</style>
</head>
<body data-requires-auth="false">
<nav class="pub-nav">
  <div class="pub-logo">⚡ PromptForge</div>
  <div class="pub-links"><a href="home.html">Home</a><a href="studio.html">Prompt Studio</a><a href="library.html">Library</a><a href="collections.html">Collections</a><a href="premium.html">Premium</a><a href="about.html">About</a></div>
  <div class="pub-right"><button class="btn-ghost" onclick="openLogin()">Sign in</button></div>
  <button class="pub-mobile-btn" onclick="togglePubMobileNav()">☰</button>
</nav>
<div class="pub-mobile-overlay" id="pubMobileOverlay" onclick="closePubMobileNav()"></div>
<div class="pub-mobile-drawer" id="pubMobileDrawer">
  <a href="home.html">Home</a>
  <a href="studio.html">Prompt Studio</a>
  <a href="text-generator.html">Generator</a>
  <a href="library.html">Library</a>
  <a href="collections.html">Collections</a>
  <a href="premium.html">Premium</a>
  <a href="about.html">About</a>
  <a href="support.html">Support</a>
</div>

<div class="pd-wrap" id="pdWrap">
  <div class="pd-empty">Loading prompt…</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="shared.js"></script>
<script>
let activePrompt = null;
let myRating = 0;
let iLiked = false;
let iBookmarked = false;

// Supports both /prompt/<id> (clean path) and /prompt.html?id=<id>
function getPromptId(){
  const params = new URLSearchParams(location.search);
  if(params.get('id')) return params.get('id');
  const parts = location.pathname.split('/').filter(Boolean);
  const last = parts[parts.length - 1];
  return (last && last !== 'prompt' && last !== 'prompt.html') ? decodeURIComponent(last) : null;
}

async function loadPrompt(){
  const id = getPromptId();
  const wrap = document.getElementById('pdWrap');

  if(!id){
    wrap.innerHTML = '<div class="pd-empty">No prompt specified.</div>';
    return;
  }

  const { data: p, error } = await sb.from('library_prompts').select('*').eq('id', id).maybeSingle();

  if(error || !p){
    wrap.innerHTML = '<div class="pd-empty">Couldn\'t find this prompt — it may have been removed.</div>';
    return;
  }
  activePrompt = p;

  // Manual creator lookup — same fix as library.html, avoids
  // PostgREST's "more than one relationship" ambiguity error.
  let creator = null;
  if(p.user_id){
    const { data: c } = await sb.from('profiles').select('display_name, username').eq('id', p.user_id).maybeSingle();
    creator = c;
  }

  document.getElementById('pageTitle').textContent = `${p.title} — PromptForge`;
  document.getElementById('pageDesc').content = p.description || `A ${p.category||''} prompt on PromptForge.`;

  const creatorName = creator?.display_name || (p.is_official ? 'PromptForge' : 'Anonymous');
  const creatorLink = creator?.username ? `creator.html?u=${encodeURIComponent(creator.username)}` : null;

  wrap.innerHTML = `
    <a class="pd-back" href="library.html">← Back to Library</a>

    <div class="pd-badges">
      <span class="lib-cat-tag" style="font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;padding:3px 10px;border-radius:99px;background:var(--indigo-g);color:var(--indigo2)">${escapeHtmlPd(p.category||'General')}</span>
      ${p.is_verified ? '<span style="font-size:10.5px;padding:3px 10px;border-radius:99px;background:var(--mint-g);color:var(--mint);font-weight:700">✓ Verified</span>' : ''}
      ${p.is_staff_pick ? '<span style="font-size:10.5px;padding:3px 10px;border-radius:99px;background:var(--amber-g);color:var(--amber);font-weight:700">★ Staff Pick</span>' : ''}
      <span style="font-size:10.5px;padding:3px 10px;border-radius:99px;background:var(--surface2);color:var(--txt2)">${escapeHtmlPd(p.difficulty||'Beginner')}</span>
    </div>

    <div class="pd-title">${escapeHtmlPd(p.title)}</div>
    ${p.description ? `<div class="pd-desc">${escapeHtmlPd(p.description)}</div>` : ''}

    <div class="pd-creator-row" ${creatorLink ? `onclick="location.href='${creatorLink}'"` : ''}>
      <div class="pd-creator-av">${escapeHtmlPd(creatorName).slice(0,2).toUpperCase()}</div>
      <div>
        <div class="pd-creator-name">${escapeHtmlPd(creatorName)}</div>
        <div class="pd-creator-meta">${p.created_at ? new Date(p.created_at).toLocaleDateString('en-US',{month:'long',year:'numeric'}) : ''}</div>
      </div>
    </div>

    <div class="pd-prompt-box">
      <div class="pd-prompt-label"><div class="pd-pulse"></div>Prompt</div>
      <div class="pd-prompt-text">${escapeHtmlPd(p.prompt_text||'(no prompt text yet)')}</div>
      <div class="pd-actions">
        <button class="pd-btn copy" onclick="copyPrompt()">📋 Copy Prompt</button>
        <button class="pd-btn" id="likeBtn" onclick="toggleLikeDetail()">🤍 <span id="likeCountLabel">${p.likes||0}</span></button>
        <button class="pd-btn" id="bookmarkBtn" onclick="toggleBookmarkDetail()">☆ Save</button>
        <button class="pd-btn" onclick="sharePrompt()">🔗 Share</button>
      </div>
    </div>

    <div class="pd-meta-row">
      <span>Rate: <span class="pd-stars" id="starRowPd"></span></span>
      <span><strong>${(p.avg_rating||0).toFixed(1)}</strong> avg (${p.rating_count||0} ratings)</span>
      <span><strong>${p.use_count||0}</strong> uses</span>
      <span>${(p.ai_models||[]).map(m=>escapeHtmlPd(m)).join(' · ')}</span>
    </div>

    <div class="pd-related-title">More in ${escapeHtmlPd(p.category||'this category')}</div>
    <div class="pd-related-grid" id="relatedGrid"><div class="pd-empty" style="padding:20px">Loading…</div></div>
  `;

  renderStarsPd(0);
  loadInteractionState(id);
  loadRelated(p.category, id);
}

async function loadInteractionState(promptId){
  if(!currentUser) return;
  const { data: rating } = await sb.from('prompt_ratings').select('rating').eq('user_id', currentUser.id).eq('prompt_id', promptId).maybeSingle();
  if(rating){ myRating = rating.rating; renderStarsPd(myRating); }

  const { data: like } = await sb.from('prompt_likes').select('id').eq('user_id', currentUser.id).eq('prompt_id', promptId).maybeSingle();
  if(like){
    iLiked = true;
    document.getElementById('likeBtn').classList.add('liked');
    document.getElementById('likeBtn').innerHTML = `❤️ <span id="likeCountLabel">${activePrompt.likes||0}</span>`;
  }

  const { data: bookmark } = await sb.from('saved_prompts').select('id').eq('user_id', currentUser.id).eq('source_prompt_id', promptId).maybeSingle();
  if(bookmark){
    iBookmarked = true;
    document.getElementById('bookmarkBtn').classList.add('saved');
    document.getElementById('bookmarkBtn').innerHTML = '★ Saved';
  }
}

async function loadRelated(category, excludeId){
  const { data: related } = await sb.from('library_prompts').select('id,title,category,likes').eq('category', category).neq('id', excludeId).order('likes',{ascending:false}).limit(4);
  const el = document.getElementById('relatedGrid');
  if(!related || !related.length){
    el.innerHTML = '<div class="pd-empty" style="padding:20px">Nothing else here yet.</div>';
    return;
  }
  el.innerHTML = related.map(r => `
    <div class="pd-related-card" onclick="location.href='prompt.html?id=${r.id}'">
      <div class="pd-related-title2">${escapeHtmlPd(r.title)}</div>
      <div class="pd-related-meta">❤️ ${r.likes||0}</div>
    </div>
  `).join('');
}

function renderStarsPd(current){
  const row = document.getElementById('starRowPd');
  row.innerHTML = '';
  for(let i=1;i<=5;i++){
    const span = document.createElement('span');
    span.className = 'pd-star' + (i <= current ? ' filled' : '');
    span.textContent = '★';
    span.onclick = () => submitRatingPd(i);
    row.appendChild(span);
  }
}

async function submitRatingPd(stars){
  if(!currentUser){ openLogin(); return; }
  try{
    const { error } = await sb.rpc('rate_prompt', { p_prompt_id: activePrompt.id, p_rating: stars });
    if(error) throw error;
    myRating = stars;
    renderStarsPd(stars);
    toast('⭐ Rating saved');
  }catch(err){
    console.error(err);
    toast('❌ Could not save rating');
  }
}

async function toggleLikeDetail(){
  if(!currentUser){ openLogin(); return; }
  try{
    const { data: nowLiked, error } = await sb.rpc('toggle_prompt_like', { p_prompt_id: activePrompt.id });
    if(error) throw error;
    iLiked = nowLiked;
    activePrompt.likes = (activePrompt.likes||0) + (nowLiked ? 1 : -1);
    const btn = document.getElementById('likeBtn');
    btn.classList.toggle('liked', nowLiked);
    btn.innerHTML = (nowLiked?'❤️ ':'🤍 ') + `<span>${activePrompt.likes||0}</span>`;
  }catch(err){
    console.error(err);
    toast('❌ Could not update like');
  }
}

async function toggleBookmarkDetail(){
  if(!currentUser){ openLogin(); return; }
  const btn = document.getElementById('bookmarkBtn');
  try{
    if(iBookmarked){
      const { error } = await sb.from('saved_prompts').delete().eq('user_id', currentUser.id).eq('source_prompt_id', activePrompt.id);
      if(error) throw error;
      iBookmarked = false;
      btn.classList.remove('saved');
      btn.innerHTML = '☆ Save';
      toast('Removed from saved');
    } else {
      const { error } = await sb.from('saved_prompts').insert({
        user_id: currentUser.id, content: activePrompt.prompt_text, category: activePrompt.category,
        source: 'library', source_prompt_id: activePrompt.id
      });
      if(error) throw error;
      iBookmarked = true;
      btn.classList.add('saved');
      btn.innerHTML = '★ Saved';
      toast('★ Saved — find it on your Dashboard');
    }
  }catch(err){
    console.error(err);
    toast('❌ ' + (err.message||'Could not update'));
  }
}

function copyPrompt(){
  navigator.clipboard.writeText(activePrompt?.prompt_text || '').then(async ()=>{
    toast('📋 Copied to clipboard');
    try{ await sb.rpc('increment_prompt_use', { p_prompt_id: activePrompt.id }); }catch(e){}
  });
}

function sharePrompt(){
  navigator.clipboard.writeText(location.href).then(()=>toast('🔗 Link copied'));
}

function escapeHtmlPd(s){
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

loadPrompt();
</script>
</body>
</html>
