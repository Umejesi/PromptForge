<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Studio — PromptForge</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.studio-layout{display:grid;grid-template-columns:340px 1fr;gap:24px;max-width:1200px;margin:0 auto;align-items:start}
.studio-browse{display:flex;flex-direction:column;gap:14px}
.studio-search{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:11px 14px;font-size:13.5px;color:var(--txt)}
.cat-filters{display:flex;gap:6px;flex-wrap:wrap}
.cat-pill{padding:5px 12px;border-radius:99px;font-size:11.5px;font-weight:600;background:var(--surface);border:1px solid var(--border);color:var(--txt2);cursor:pointer;transition:all 0.15s}
.cat-pill.on{background:var(--indigo-g);border-color:rgba(108,99,255,0.35);color:var(--indigo2)}
.template-list{display:flex;flex-direction:column;gap:8px;max-height:60vh;overflow-y:auto}
.template-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:14px 16px;cursor:pointer;transition:all 0.15s;
}
.template-card:hover{border-color:rgba(108,99,255,0.25)}
.template-card.active{border-color:var(--indigo);background:var(--indigo-g)}
.tc-cat{font-size:10px;color:var(--indigo2);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px}
.tc-title{font-family:var(--display);font-size:14px;font-weight:700;margin-bottom:4px}
.tc-meta{font-size:11px;color:var(--txt3)}
.tc-models{display:flex;gap:4px;margin-top:8px}
.model-badge{font-size:9px;padding:2px 6px;border-radius:99px;background:var(--surface2);color:var(--txt2);border:1px solid var(--border)}

.studio-workspace{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r-xl);padding:32px;min-height:500px}
.workspace-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:400px;gap:14px;color:var(--txt3);text-align:center}
.workspace-empty-icon{font-size:44px;opacity:0.3}

.workspace-active{display:none}
.workspace-active.show{display:block}
.wa-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:10px}
.wa-title{font-family:var(--display);font-size:20px;font-weight:800;letter-spacing:-0.3px}
.wa-models{display:flex;gap:6px}

.studio-grid{display:grid;grid-template-columns:1fr 1fr;gap:28px}
.studio-fields{display:flex;flex-direction:column;gap:16px}
.sf-field label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--txt3);margin-bottom:7px}
.sf-input{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:11px 14px;font-size:14px;color:var(--txt);transition:border-color 0.15s}
.sf-input:focus{outline:none;border-color:rgba(108,99,255,0.5)}
.sf-input::placeholder{color:var(--txt3)}

.studio-preview{background:var(--deep);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;display:flex;flex-direction:column}
.sp-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.09em;color:var(--mint);margin-bottom:14px;display:flex;align-items:center;gap:6px}
.pulse-dot{width:6px;height:6px;border-radius:50%;background:var(--mint)}
.sp-text{font-family:var(--mono);font-size:13px;line-height:1.8;color:var(--txt);white-space:pre-wrap;word-break:break-word;flex:1}
.sp-fill{color:var(--amber);font-weight:600}
.sp-actions{display:flex;gap:8px;margin-top:18px;padding-top:18px;border-top:1px solid var(--border)}
.btn-sm{padding:9px 16px;border-radius:var(--r-sm);font-size:12.5px;font-weight:600;background:var(--surface2);border:1px solid var(--border);color:var(--txt2);transition:all 0.15s}
.btn-sm:hover{color:var(--txt);border-color:var(--border2)}

@media(max-width:900px){.studio-layout{grid-template-columns:1fr}.studio-grid{grid-template-columns:1fr}}
@media(max-width:600px){
  .studio-workspace{padding:20px}
  .wa-header{flex-direction:column;align-items:flex-start}
  .template-list{max-height:300px}
  .sp-actions{flex-wrap:wrap}
}
</style>
</head>
<body data-requires-auth="false">

<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><div style="width:30px;height:30px;background:linear-gradient(135deg,#6C63FF,#FFB830);border-radius:8px"></div><div class="sidebar-logo-text">PromptForge</div></div>
    <nav class="sidebar-nav">
      <div class="nav-section"><div class="nav-label">Create</div>
        <div class="nav-item" onclick="location.href='home.html'"><span class="nav-icon">🏠</span> Home</div>
        <div class="nav-item active"><span class="nav-icon">🧪</span> Prompt Studio</div>
        <div class="nav-item" onclick="location.href='text-generator.html'"><span class="nav-icon">⚡</span> Generator</div>
        <div class="nav-item" onclick="location.href='library.html'"><span class="nav-icon">📚</span> Library</div>
        <div class="nav-item" onclick="location.href='collections.html'"><span class="nav-icon">🗂</span> Collections</div>
      </div>
      <div class="nav-section"><div class="nav-label">Community</div>
        <div class="nav-item" onclick="location.href='challenge.html'"><span class="nav-icon">🔥</span> Daily Challenge</div>
        <div class="nav-item" onclick="location.href='leaderboard.html'"><span class="nav-icon">🏆</span> Leaderboard</div>
      </div>
      <div class="nav-section"><div class="nav-label">Account</div>
        <div class="nav-item" onclick="location.href='dashboard.html'"><span class="nav-icon">📊</span> Dashboard</div>
        <div class="nav-item" onclick="location.href='premium.html'"><span class="nav-icon">✦</span> Premium</div>
      </div>
    </nav>
  </aside>

  <main class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px"><button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <div><div class="page-title">Prompt Studio</div><div class="page-breadcrumb">Fill in the blanks, get a polished prompt</div></div>
      </div>
      <div class="topbar-right"><div class="user-avatar" data-user-initials onclick="handleLogout()" title="Sign out">?</div></div>
    </div>

    <div class="content">
      <div class="studio-layout">
        <div class="studio-browse">
          <input class="studio-search" id="studioSearch" placeholder="Search templates..." oninput="filterTemplates()" />
          <div class="cat-filters" id="catFilters"></div>
          <div class="template-list" id="templateList"></div>
        </div>

        <div class="studio-workspace">
          <div class="workspace-empty" id="workspaceEmpty">
            <div class="workspace-empty-icon">🧪</div>
            <div style="font-size:14px;max-width:240px;line-height:1.6">Pick a template on the left to start filling it in</div>
          </div>

          <div class="workspace-active" id="workspaceActive">
            <div class="wa-header">
              <div class="wa-title" id="waTitle"></div>
              <div class="wa-models" id="waModels"></div>
            </div>
            <div class="studio-grid">
              <div class="studio-fields" id="studioFields"></div>
              <div class="studio-preview">
                <div class="sp-label"><div class="pulse-dot"></div>Live Preview</div>
                <div class="sp-text" id="spText"></div>
                <div class="sp-actions">
                  <button class="btn-sm" onclick="copyStudioPrompt()">📋 Copy</button>
                  <button class="btn-sm" onclick="saveStudioPrompt()">💾 Save</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="shared.js"></script>
<script>
let allTemplates = [];
let allCategories = [];
let activeTemplate = null;
let activeCategory = 'all';
let currentFinalPrompt = '';

async function loadStudio(){
  const {data: cats} = await sb.from('categories').select('*');
  allCategories = cats || [];
  renderCatFilters();

  const {data: templates} = await sb.from('studio_templates').select('*').order('use_count', {ascending:false});
  allTemplates = templates || [];
  renderTemplateList(allTemplates);
}

function renderCatFilters(){
  const html = [`<div class="cat-pill on" onclick="filterByCat('all',this)">All</div>`]
    .concat(allCategories.map(c => `<div class="cat-pill" onclick="filterByCat('${c.id}',this)">${c.icon} ${c.label}</div>`));
  document.getElementById('catFilters').innerHTML = html.join('');
}

function renderTemplateList(items){
  if(!items.length){
    document.getElementById('templateList').innerHTML = `<div style="text-align:center;padding:30px;color:var(--txt3);font-size:13px">No templates match.</div>`;
    return;
  }
  document.getElementById('templateList').innerHTML = items.map(t=>{
    const cat = allCategories.find(c=>c.id===t.category_id);
    const models = (t.ai_models||[]).map(m=>`<span class="model-badge">${modelLabel(m)}</span>`).join('');
    return `<div class="template-card" data-id="${t.id}" onclick="selectTemplate('${t.id}')">
      <div class="tc-cat">${cat ? cat.icon+' '+cat.label : ''}</div>
      <div class="tc-title">${escapeHtmlS(t.title)}</div>
      <div class="tc-meta">${t.use_count||0} uses</div>
      <div class="tc-models">${models}</div>
    </div>`;
  }).join('');
}

function modelLabel(m){
  return {chatgpt:'ChatGPT', claude:'Claude', gemini:'Gemini', grok:'Grok'}[m] || m;
}
function escapeHtmlS(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}

function filterByCat(catId, el){
  document.querySelectorAll('.cat-pill').forEach(p=>p.classList.remove('on'));
  el.classList.add('on');
  activeCategory = catId;
  filterTemplates();
}

function filterTemplates(){
  const q = document.getElementById('studioSearch').value.trim().toLowerCase();
  let items = allTemplates;
  if(activeCategory !== 'all') items = items.filter(t=>t.category_id===activeCategory);
  if(q) items = items.filter(t=>t.title.toLowerCase().includes(q));
  renderTemplateList(items);
}

function selectTemplate(id){
  activeTemplate = allTemplates.find(t=>t.id===id);
  if(!activeTemplate) return;

  document.querySelectorAll('.template-card').forEach(c=>c.classList.toggle('active', c.dataset.id===id));
  document.getElementById('workspaceEmpty').style.display = 'none';
  document.getElementById('workspaceActive').classList.add('show');
  document.getElementById('waTitle').textContent = activeTemplate.title;
  document.getElementById('waModels').innerHTML = (activeTemplate.ai_models||[])
    .map(m=>`<span class="model-badge">✓ ${modelLabel(m)}</span>`).join('');

  const fields = activeTemplate.fields || [];
  document.getElementById('studioFields').innerHTML = fields.map((f,i)=>`
    <div class="sf-field">
      <label>${escapeHtmlS(f.key)}</label>
      <input class="sf-input" data-key="${escapeHtmlS(f.key)}" placeholder="${escapeHtmlS(f.placeholder||'')}" oninput="updatePreview()" />
    </div>`).join('');

  updatePreview();
}

function updatePreview(){
  if(!activeTemplate) return;

  // Build the display version with highlighted filled-in parts
  let displayText = activeTemplate.template;
  const inputs = document.querySelectorAll('#studioFields .sf-input');
  inputs.forEach(inp=>{
    const key = inp.dataset.key;
    const val = inp.value.trim();
    const replacement = val
      ? `<span style="color:var(--mint);font-weight:600">${escapeHtmlS(val)}</span>`
      : `<span class="sp-fill">[${escapeHtmlS(key)}]</span>`;
    displayText = displayText.split(`[${key}]`).join(replacement);
  });
  document.getElementById('spText').innerHTML = displayText;

  // Build the plain-text version (for copy/save) separately
  let plainText = activeTemplate.template;
  inputs.forEach(inp=>{
    const key = inp.dataset.key;
    const val = inp.value.trim();
    plainText = plainText.split(`[${key}]`).join(val || `[${key}]`);
  });
  currentFinalPrompt = plainText;
}

function copyStudioPrompt(){
  if(!currentFinalPrompt){toast('⚠️ Fill in the template first');return}
  navigator.clipboard.writeText(currentFinalPrompt).then(()=>toast('✅ Copied!'));
  if(activeTemplate){
    sb.from('studio_templates').update({use_count:(activeTemplate.use_count||0)+1}).eq('id', activeTemplate.id);
  }
}

async function saveStudioPrompt(){
  if(!currentFinalPrompt){toast('⚠️ Fill in the template first');return}
  if(!currentUser){toast('💾 Sign in to save prompts');openLogin();return}
  const {error} = await sb.from('saved_prompts').insert({
    user_id: currentUser.id,
    content: currentFinalPrompt,
    category: activeTemplate?.category_id || 'studio',
    source: 'studio'
  });
  if(error){toast('❌ '+error.message);return}
  toast('💾 Saved to your prompts!');
}

document.addEventListener('DOMContentLoaded', loadStudio);
</script>
</body>
</html>
