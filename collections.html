<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collections — PromptForge</title>
<meta name="description" content="Curated multi-prompt workflows for launching products, hiring, content planning, and more — all in one place.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
/* ── Collections-specific styles ── */
.col-header{margin-bottom:24px}
.col-header h1{font-family:var(--display,'Plus Jakarta Sans',sans-serif);font-size:clamp(24px,4vw,32px);font-weight:800;letter-spacing:-0.5px;margin-bottom:6px}
.col-header p{color:var(--txt2,#9895B0);font-size:14px;max-width:560px}

.col-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.col-pill{padding:7px 16px;border-radius:99px;font-size:13px;font-weight:600;background:var(--surface,#131625);border:1px solid var(--border,rgba(255,255,255,0.08));color:var(--txt2,#9895B0);cursor:pointer;transition:all .15s}
.col-pill:hover{border-color:var(--border2,rgba(255,255,255,0.14));color:var(--txt,#E8E5F4)}
.col-pill.on{background:var(--indigo-g,rgba(108,99,255,0.14));border-color:rgba(108,99,255,0.4);color:var(--indigo2,#8B85FF)}

.col-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.col-card{background:var(--surface,#131625);border:1px solid var(--border,rgba(255,255,255,0.08));border-radius:16px;padding:22px;display:flex;flex-direction:column;gap:12px;transition:all .2s;cursor:pointer}
.col-card:hover{border-color:rgba(108,99,255,.3);transform:translateY(-2px)}
.col-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.col-icon{width:44px;height:44px;border-radius:12px;background:var(--indigo-g,rgba(108,99,255,.14));display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.col-badge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:3px 10px;border-radius:99px;background:var(--amber-g,rgba(255,184,48,.1));color:var(--amber,#FFB830);border:1px solid rgba(255,184,48,.25);white-space:nowrap}
.col-title{font-family:var(--display,'Plus Jakarta Sans',sans-serif);font-size:17px;font-weight:700}
.col-desc{font-size:13px;color:var(--txt2,#9895B0);line-height:1.6}
.col-meta{display:flex;align-items:center;gap:14px;font-size:12px;color:var(--txt3,#4E4B65);padding-top:10px;border-top:1px solid var(--border,rgba(255,255,255,0.08))}

.col-empty{text-align:center;padding:60px 20px;color:var(--txt3,#4E4B65)}

/* Detail modal */
.col-modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto;backdrop-filter:blur(4px)}
.col-modal-overlay.open{display:flex}
.col-modal{background:var(--surface,#131625);border:1px solid var(--border2,rgba(255,255,255,.14));border-radius:20px;max-width:720px;width:100%;padding:0;overflow:hidden}
.col-modal-head{padding:28px 28px 20px;border-bottom:1px solid var(--border,rgba(255,255,255,0.08));display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
.col-modal-close{width:32px;height:32px;border-radius:8px;background:var(--surface2,#1A1E30);color:var(--txt2,#9895B0);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:16px}
.col-modal-close:hover{color:var(--txt,#E8E5F4)}
.col-modal-body{padding:20px 28px 28px;display:flex;flex-direction:column;gap:14px;max-height:60vh;overflow-y:auto}
.col-item{background:var(--surface2,#1A1E30);border:1px solid var(--border,rgba(255,255,255,0.08));border-radius:12px;padding:16px 18px}
.col-item-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}
.col-item-num{width:22px;height:22px;border-radius:6px;background:var(--indigo-g,rgba(108,99,255,.14));color:var(--indigo2,#8B85FF);font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.col-item-title{font-size:14px;font-weight:700;flex:1}
.col-item-desc{font-size:12px;color:var(--txt3,#4E4B65);margin-bottom:8px}
.col-item-prompt{font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.6;color:var(--txt2,#9895B0);background:rgba(0,0,0,.2);border-radius:8px;padding:10px 12px;white-space:pre-wrap}
.col-item-foot{display:flex;align-items:center;justify-content:space-between;margin-top:10px;gap:10px}
.col-ai-tags{display:flex;gap:5px;flex-wrap:wrap}
.col-ai-tag{font-size:10px;padding:2px 8px;border-radius:99px;background:var(--surface,#131625);border:1px solid var(--border,rgba(255,255,255,0.08));color:var(--txt3,#4E4B65)}
.btn-copy-item{padding:5px 12px;border-radius:6px;font-size:11px;font-weight:600;background:var(--indigo-g,rgba(108,99,255,.14));border:1px solid rgba(108,99,255,.3);color:var(--indigo2,#8B85FF);cursor:pointer}
.btn-copy-item:hover{background:rgba(108,99,255,.25)}
.col-modal-actions{padding:18px 28px;border-top:1px solid var(--border,rgba(255,255,255,0.08));display:flex;gap:10px}
.btn-save-col{flex:1;padding:12px;border-radius:10px;font-size:14px;font-weight:700;background:linear-gradient(135deg,var(--indigo,#6C63FF),#8B5CF6);color:#fff;cursor:pointer;font-family:var(--display,'Plus Jakarta Sans',sans-serif)}
.btn-save-col:hover{opacity:.9}
.btn-save-col.saved{background:var(--surface2,#1A1E30);color:var(--mint,#00F5A0)}

@media(max-width:640px){
  .col-grid{grid-template-columns:1fr}
  .col-modal-overlay{padding:0}
  .col-modal{border-radius:0;max-width:100%;min-height:100vh}
}
</style>
</head>
<body>

<div class="app-shell">
  <nav class="sidebar" id="sidebar">
    <div class="nav-logo" style="padding:20px 20px 16px;display:flex;align-items:center;gap:9px;font-family:var(--display,'Plus Jakarta Sans',sans-serif);font-weight:800;font-size:16px">
      <div style="width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--indigo,#6C63FF),#8B5CF6);display:flex;align-items:center;justify-content:center;font-size:13px">⚡</div>
      PromptForge
    </div>
    <div class="nav-section">
      <a href="home.html" class="nav-link">🏠 Home</a>
      <a href="studio.html" class="nav-link">🛠 Prompt Studio</a>
      <a href="text-generator.html" class="nav-link">✍️ Generator</a>
      <a href="library.html" class="nav-link">📚 Library</a>
      <a href="collections.html" class="nav-link active">📦 Collections</a>
      <a href="challenge.html" class="nav-link">🔥 Daily Challenge</a>
      <a href="leaderboard.html" class="nav-link">🏆 Leaderboard</a>
      <a href="dashboard.html" class="nav-link">📊 Dashboard</a>
      <a href="premium.html" class="nav-link">✦ Premium</a>
    </div>
  </nav>

  <div class="main">
    <header class="topbar" style="display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border,rgba(255,255,255,0.08))">
      <button class="menu-btn" onclick="toggleSidebar()" style="display:none;background:none;border:none;color:var(--txt,#E8E5F4);font-size:20px;cursor:pointer">☰</button>
      <div></div>
      <div data-auth-slot></div>
    </header>

    <div class="content" style="padding:28px 24px 60px;min-width:0">
      <div class="banner-slot" id="topBanner" style="min-height:50px;margin-bottom:20px"></div>

      <div class="col-header">
        <h1>Prompt Collections</h1>
        <p>Complete, multi-step workflows — not just single prompts. Save an entire collection and work through it start to finish.</p>
      </div>

      <div class="col-filters" id="colFilters">
        <div class="col-pill on" data-cat="all" onclick="filterCollections('all',this)">✦ All</div>
      </div>

      <div class="col-grid" id="colGrid">
        <div class="col-empty">Loading collections…</div>
      </div>
    </div>
  </div>
</div>

<!-- Collection detail modal -->
<div class="col-modal-overlay" id="colModal" onclick="if(event.target===this)closeColModal()">
  <div class="col-modal">
    <div class="col-modal-head">
      <div>
        <div id="modalIcon" style="font-size:26px;margin-bottom:6px"></div>
        <div style="font-family:var(--display,'Plus Jakarta Sans',sans-serif);font-size:20px;font-weight:800" id="modalTitle"></div>
        <div style="font-size:13px;color:var(--txt2,#9895B0);margin-top:4px" id="modalDesc"></div>
      </div>
      <div class="col-modal-close" onclick="closeColModal()">✕</div>
    </div>
    <div class="col-modal-body" id="modalBody"></div>
    <div class="col-modal-actions">
      <button class="btn-save-col" id="saveColBtn" onclick="toggleSaveCollection()">💾 Save this Collection</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="shared.js"></script>
<script>
let allCollections = [];
let activeCollection = null;
let savedCollectionIds = new Set();

async function loadCollections(){
  const grid = document.getElementById('colGrid');
  try{
    if(typeof sb === 'undefined'){ throw new Error('client not ready'); }

    const { data: cols, error } = await sb
      .from('collections')
      .select('id,title,slug,description,icon,is_premium,use_count,category_name')
      .order('created_at', { ascending: false });

    if(error) throw error;
    allCollections = cols || [];

    // Build category filter pills from whatever categories are actually used
    const cats = [...new Set(allCollections.map(c => c.category_name).filter(Boolean))];
    const filterRow = document.getElementById('colFilters');
    cats.forEach(name=>{
      const pill = document.createElement('div');
      pill.className = 'col-pill';
      pill.dataset.cat = name;
      pill.textContent = name;
      pill.onclick = () => filterCollections(name, pill);
      filterRow.appendChild(pill);
    });

    // Load which ones the signed-in user has already saved
    try{
      const { data: { session } } = await sb.auth.getSession();
      if(session){
        const { data: saved } = await sb.from('saved_collections').select('collection_id').eq('user_id', session.user.id);
        savedCollectionIds = new Set((saved||[]).map(s=>s.collection_id));
      }
    }catch(e){}

    renderCollections(allCollections);
  }catch(err){
    console.error('Collections load error:', err);
    grid.innerHTML = '<div class="col-empty">Couldn\'t load collections right now. Try refreshing.</div>';
  }
}

function renderCollections(list){
  const grid = document.getElementById('colGrid');
  if(!list.length){
    grid.innerHTML = '<div class="col-empty">No collections in this category yet.</div>';
    return;
  }
  grid.innerHTML = list.map(c => `
    <div class="col-card" onclick="openCollection('${c.id}')">
      <div class="col-card-top">
        <div class="col-icon">${c.icon || '📦'}</div>
        ${c.is_premium ? '<span class="col-badge">✦ Premium</span>' : ''}
      </div>
      <div class="col-title">${escapeHtml(c.title)}</div>
      <div class="col-desc">${escapeHtml(c.description)}</div>
      <div class="col-meta">
        <span>${c.category_name || 'General'}</span>
        <span>·</span>
        <span>${c.use_count || 0} uses</span>
      </div>
    </div>
  `).join('');
}

function filterCollections(cat, el){
  document.querySelectorAll('.col-pill').forEach(p=>p.classList.remove('on'));
  el.classList.add('on');
  if(cat === 'all'){ renderCollections(allCollections); return; }
  renderCollections(allCollections.filter(c => c.category_name === cat));
}

async function openCollection(id){
  const col = allCollections.find(c => c.id === id);
  if(!col) return;
  activeCollection = col;

  document.getElementById('modalIcon').textContent = col.icon || '📦';
  document.getElementById('modalTitle').textContent = col.title;
  document.getElementById('modalDesc').textContent = col.description;

  const body = document.getElementById('modalBody');
  body.innerHTML = '<div class="col-empty">Loading prompts…</div>';
  document.getElementById('colModal').classList.add('open');

  const saveBtn = document.getElementById('saveColBtn');
  const isSaved = savedCollectionIds.has(col.id);
  saveBtn.textContent = isSaved ? '✓ Saved to your account' : '💾 Save this Collection';
  saveBtn.classList.toggle('saved', isSaved);

  try{
    const { data: items, error } = await sb
      .from('collection_items')
      .select('*')
      .eq('collection_id', id)
      .order('position', { ascending: true });
    if(error) throw error;

    body.innerHTML = (items||[]).map((it,i) => `
      <div class="col-item">
        <div class="col-item-top">
          <div style="display:flex;align-items:center;gap:8px">
            <div class="col-item-num">${i+1}</div>
            <div class="col-item-title">${escapeHtml(it.title)}</div>
          </div>
        </div>
        ${it.description ? `<div class="col-item-desc">${escapeHtml(it.description)}</div>` : ''}
        <div class="col-item-prompt" id="item-${it.id}">${escapeHtml(it.prompt_text)}</div>
        <div class="col-item-foot">
          <div class="col-ai-tags">${(it.ai_models||[]).map(m=>`<span class="col-ai-tag">✓ ${m}</span>`).join('')}</div>
          <button class="btn-copy-item" onclick="copyItem('${it.id}','${col.id}')">📋 Copy</button>
        </div>
      </div>
    `).join('') || '<div class="col-empty">No prompts in this collection yet.</div>';
  }catch(err){
    console.error(err);
    body.innerHTML = '<div class="col-empty">Couldn\'t load these prompts. Try again.</div>';
  }
}

function closeColModal(){
  document.getElementById('colModal').classList.remove('open');
}

function copyItem(itemId, collectionId){
  const el = document.getElementById('item-' + itemId);
  if(!el) return;
  navigator.clipboard.writeText(el.textContent).then(async ()=>{
    if(typeof toast === 'function') toast('📋 Copied to clipboard');
    try{ await sb.rpc('increment_collection_use', { p_collection_id: collectionId }); }catch(e){}
  });
}

async function toggleSaveCollection(){
  if(!activeCollection) return;
  try{
    const { data: { session } } = await sb.auth.getSession();
    if(!session){
      if(typeof openLogin === 'function') openLogin();
      else if(typeof toast==='function') toast('⚠️ Sign in to save collections');
      return;
    }
    const btn = document.getElementById('saveColBtn');
    const isSaved = savedCollectionIds.has(activeCollection.id);

    if(isSaved){
      await sb.from('saved_collections').delete().eq('user_id', session.user.id).eq('collection_id', activeCollection.id);
      savedCollectionIds.delete(activeCollection.id);
      btn.textContent = '💾 Save this Collection';
      btn.classList.remove('saved');
      if(typeof toast==='function') toast('Removed from saved');
    }else{
      await sb.from('saved_collections').insert({ user_id: session.user.id, collection_id: activeCollection.id });
      savedCollectionIds.add(activeCollection.id);
      btn.textContent = '✓ Saved to your account';
      btn.classList.add('saved');
      if(typeof toast==='function') toast('✅ Collection saved');
    }
  }catch(err){
    console.error(err);
    if(typeof toast==='function') toast('❌ Something went wrong — try again');
  }
}

function escapeHtml(str){
  if(!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

document.addEventListener('DOMContentLoaded', () => {
  // Give shared.js a moment to initialize the Supabase client before we query
  const start = () => loadCollections();
  if(typeof sb !== 'undefined') start();
  else setTimeout(start, 400);

  if(typeof updateAuthUI === 'function') updateAuthUI();
  if(typeof loadCurrentUser === 'function') loadCurrentUser();
});
</script>
</body>
</html>
